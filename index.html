<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,maximum-scale=1">
<title>Codex Chat</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;background:#0d0d0d;color:#e0e0e0;height:100vh;display:flex;flex-direction:column;overflow:hidden}
.header{background:#0a0a1a;padding:12px 14px;text-align:center;border-bottom:1px solid #1a1a3e;flex-shrink:0;display:flex;align-items:center;justify-content:center;gap:8px}
.header .icon{width:28px;height:28px;background:linear-gradient(135deg,#00d2ff,#3a7bd5);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;color:#fff}
.header h1{font-size:16px;color:#00d2ff;font-weight:600;letter-spacing:.5px}
.header .badge{font-size:10px;background:#00d2ff20;color:#00d2ff;padding:2px 8px;border-radius:10px}
.chat{flex:1;overflow-y:auto;padding:12px 10px;-webkit-overflow-scrolling:touch}
.msg{display:flex;margin-bottom:14px;animation:fadeIn .35s ease}
.msg.user{justify-content:flex-end}
.msg .bubble{max-width:80%;padding:11px 15px;border-radius:18px;font-size:15px;line-height:1.55;word-break:break-word;position:relative}
.msg.bot .bubble{background:#13132e;border-bottom-left-radius:6px;color:#d0d0e0}
.msg.user .bubble{background:linear-gradient(135deg,#00a8cc,#0077b6);border-bottom-right-radius:6px;color:#fff}
.input-area{display:flex;padding:10px 10px 14px;background:#0a0a1a;border-top:1px solid #1a1a3e;flex-shrink:0;gap:8px}
.input-area input{flex:1;padding:11px 16px;border:none;border-radius:22px;font-size:15px;background:#1a1a2e;color:#e0e0e0;outline:none;transition:background .2s}
.input-area input:focus{background:#222240}
.input-area button{width:44px;height:44px;border:none;border-radius:50%;background:linear-gradient(135deg,#00d2ff,#3a7bd5);color:#fff;font-size:20px;cursor:pointer;flex-shrink:0;transition:transform .15s}
.input-area button:active{transform:scale(.92)}
.typing{display:none;margin-bottom:14px;padding-left:8px}
.typing .dots{display:flex;gap:4px;padding:11px 15px;background:#13132e;border-radius:18px;border-bottom-left-radius:6px}
.typing .dots span{width:7px;height:7px;background:#00d2ff;border-radius:50%;animation:bounce 1.4s infinite}
.typing .dots span:nth-child(2){animation-delay:.2s}
.typing .dots span:nth-child(3){animation-delay:.4s}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes bounce{0%,80%,100%{transform:scale(0)}40%{transform:scale(1)}}
.new-session{display:block;width:100%;padding:8px;margin:8px 0 16px;background:transparent;border:1px dashed #333;border-radius:12px;color:#666;font-size:13px;cursor:pointer;text-align:center}
.new-session:active{background:#1a1a2e}
</style>
</head>
<body>
<div class="header">
<div class="icon">C</div>
<h1>Codex AI</h1>
<div class="badge">ChatGPT</div>
</div>
<div class="chat" id="chat"></div>
<div class="typing" id="typing"><div class="dots"><span></span><span></span><span></span></div></div>
<div class="input-area">
<input id="input" type="text" placeholder="输入消息..." autocomplete="off" enterkeyhint="send">
<button onclick="send()">&#10148;</button>
</div>

<script>
const API_KEY = "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";
const API_URL = "https://api.openai.com/v1/chat/completions";
const MODEL = "gpt-4o-mini";
const MAX_HISTORY = 30;

let history = JSON.parse(localStorage.getItem("codex_history") || "[]");

function saveHistory() {
  if (history.length > MAX_HISTORY * 2) history = history.slice(-MAX_HISTORY * 2);
  localStorage.setItem("codex_history", JSON.stringify(history));
}

function esc(s) {
  return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/\n/g,"<br>");
}

function scrollBottom() {
  var c = document.getElementById("chat");
  c.scrollTop = c.scrollHeight;
}

function addMsg(role, text) {
  var d = document.getElementById("chat");
  var m = document.createElement("div");
  m.className = "msg " + role;
  m.innerHTML = '<div class="bubble">' + esc(text) + '</div>';
  d.appendChild(m);
  scrollBottom();
}

function renderHistory() {
  var d = document.getElementById("chat");
  d.innerHTML = '<button class="new-session" onclick="clearSession()">+ 新对话</button>';
  history.forEach(function(h) {
    var m = document.createElement("div");
    m.className = "msg " + h.role;
    m.innerHTML = '<div class="bubble">' + esc(h.content) + '</div>';
    d.appendChild(m);
  });
  scrollBottom();
}

function clearSession() {
  if (confirm("开始新对话？")) { history = []; saveHistory(); renderHistory(); }
}

async function send() {
  var inp = document.getElementById("input");
  var text = inp.value.trim();
  if (!text) return;
  inp.value = "";
  inp.disabled = true;

  addMsg("user", text);
  history.push({role:"user",content:text});
  saveHistory();

  document.getElementById("typing").style.display = "flex";
  scrollBottom();

  try {
    var resp = await fetch(API_URL, {
      method: "POST",
      headers: {"Content-Type":"application/json","Authorization":"Bearer "+API_KEY},
      body: JSON.stringify({
        model: MODEL,
        messages: [
          {role:"system",content:"你是 Codex，友好的 AI 助手。用中文回复，简洁准确，有温度。"},
          ...history.slice(-MAX_HISTORY)
        ],
        temperature:0.7,
        max_tokens:1500
      })
    });
    var data = await resp.json();
    var reply = data.choices?.[0]?.message?.content || "抱歉，出错了。请稍后重试。";

    document.getElementById("typing").style.display = "none";
    addMsg("bot", reply);
    history.push({role:"assistant",content:reply});
    saveHistory();
  } catch(e) {
    document.getElementById("typing").style.display = "none";
    addMsg("bot", "网络错误，请检查连接后重试。");
  }
  inp.disabled = false;
  inp.focus();
}

document.getElementById("input").addEventListener("keydown", function(e) {
  if (e.key === "Enter") send();
});

renderHistory();
</script>
</body>
</html>
