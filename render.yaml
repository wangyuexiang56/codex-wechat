services:
  - type: web
    name: codex-wechat
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn wx_server:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    envVars:
      - key: WX_TOKEN
        value: codex2024
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4o-mini
